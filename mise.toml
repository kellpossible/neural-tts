[tools]
uv = "latest"
python = "3.12"

[env]
NEURAL_TTS_REPO_ROOT = "{{ config_root }}"

[tasks.sync-daemon]
description = "Create/update the daemon venv (numpy, soxr, protobuf + dev tools)"
run = "cd daemon && uv sync --extra dev"

[tasks.install-provider]
description = "Install a provider venv (creates its .venv and downloads model files)"
usage = '''
arg "<provider>" help="Provider name (e.g. kokoro-onnx)"
flag "--extra <extra>" help="uv extras to enable (e.g. gpu)"
flag "--skip-models" help="Skip the model download step"
'''
run = '''
set -e
args="$usage_provider"
if [ -n "$usage_extra" ]; then args="$args --extra $usage_extra"; fi
if [ "$usage_skip_models" = "true" ]; then args="$args --skip-models"; fi
python3 scripts/install_provider.py $args
'''

[tasks.uninstall-provider]
description = "Reset a provider: remove its venv and vendored upstream source"
usage = '''
arg "<provider>" help="Provider name (e.g. kokoro-onnx)"
flag "--purge-models" help="Also delete the provider's downloaded model files"
flag "--yes" help="Assume yes for all prompts (non-interactive)"
'''
run = '''
set -e
args="$usage_provider"
if [ "$usage_purge_models" = "true" ]; then args="$args --purge-models"; fi
if [ "$usage_yes" = "true" ]; then args="$args --yes"; fi
python3 scripts/uninstall_provider.py $args
'''

[tasks.download-models]
description = "Download model files for a provider"
usage = '''
arg "[provider]" help="Provider name (default: kokoro-onnx)" default="kokoro-onnx"
flag "--with-int8" help="Also download kokoro INT8 model (smaller but slower on modern CPUs)"
'''
run = '''
set -e
provider="${usage_provider:-kokoro-onnx}"
extra=""
if [ "$usage_with_int8" = "true" ]; then extra="--with-int8"; fi
python3 scripts/download_models.py "$provider" $extra
'''

[tasks.install]
description = "Install systemd units + speechd module config (user scope)"
depends = ["sync-daemon"]
usage = '''
flag "--yes" help="Assume yes for all prompts (non-interactive)"
'''
run = '''
set -e
yes=""
if [ "$usage_yes" = "true" ]; then yes="--yes"; fi
python3 scripts/install.py $yes
'''

[tasks.uninstall]
description = "Remove installed units + speechd module config"
run = "python3 scripts/uninstall.py"

[tasks.run]
description = "Run the daemon in the foreground (no socket activation)"
depends = ["sync-daemon"]
run = "daemon/.venv/bin/python -m neural_tts_daemon --foreground"

[tasks.status]
description = "Show daemon status via the control socket"
run = "bin/neural-tts-ctl status"

[tasks.reload-voices]
description = "Rebuild the global voice index (the daemon spawns each enabled provider briefly to enumerate)"
run = "bin/neural-tts-ctl reload-voices"

[tasks.voices]
description = "Show current voices known to speech-dispatcher"
run = '''
set -e
bin/neural-tts-ctl status
spd-say -o neural-tts --list-synthesis-voices || true
'''

[tasks.logs]
description = "Follow daemon journal"
run = "journalctl --user -u neural-tts.service -f"

[tasks.test]
description = "Run unit and integration tests"
depends = ["sync-daemon"]
run = "daemon/.venv/bin/python -m pytest -v tests/"

[tasks.gen-proto]
description = "Regenerate *_pb2.py from proto/neural_tts.proto"
depends = ["sync-daemon"]
run = '''
set -e
daemon/.venv/bin/python -m grpc_tools.protoc -Iproto \
    --python_out=daemon/src/neural_tts_daemon/pb \
    --pyi_out=daemon/src/neural_tts_daemon/pb \
    proto/neural_tts.proto
daemon/.venv/bin/python -m grpc_tools.protoc -Iproto \
    --python_out=providers/kokoro-onnx/src/neural_tts_provider_kokoro_onnx/pb \
    --pyi_out=providers/kokoro-onnx/src/neural_tts_provider_kokoro_onnx/pb \
    proto/neural_tts.proto
daemon/.venv/bin/python -m grpc_tools.protoc -Iproto \
    --python_out=providers/longcat-audiodit/src/neural_tts_provider_longcat_audiodit/pb \
    --pyi_out=providers/longcat-audiodit/src/neural_tts_provider_longcat_audiodit/pb \
    proto/neural_tts.proto
daemon/.venv/bin/python -m grpc_tools.protoc -Iproto \
    --python_out=providers/moss-tts-nano/src/neural_tts_provider_moss_tts_nano/pb \
    --pyi_out=providers/moss-tts-nano/src/neural_tts_provider_moss_tts_nano/pb \
    proto/neural_tts.proto
echo "Regenerated neural_tts_pb2.py in all provider packages."
'''
