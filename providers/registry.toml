# Provider registry — read by the daemon at startup.
# Each provider is its own uv project; the daemon spawns it as a subprocess.

[providers.kokoro-onnx]
display_name = "Kokoro (ONNX)"
project_dir = "providers/kokoro-onnx"
python_module = "neural_tts_provider_kokoro_onnx"
supports_cloning = false
needs_models = true
notes = "Auto-selects FP32 model on GPU, INT8 on CPU."

[providers.longcat-audiodit]
display_name = "LongCat-AudioDiT (1B)"
project_dir = "providers/longcat-audiodit"
python_module = "neural_tts_provider_longcat_audiodit"
supports_cloning = true
needs_models = true
notes = "Zero-shot voice cloning. CUDA-only. Drop reference clips into ~/.local/share/neural-tts-daemon/voices/longcat/<id>.<en|zh>.{wav,txt}."

[providers.moss-tts-nano]
display_name = "MOSS-TTS-Nano (100M, ONNX)"
project_dir = "providers/moss-tts-nano"
python_module = "neural_tts_provider_moss_tts_nano"
supports_cloning = true
needs_models = true
notes = "Zero-shot voice cloning, CPU-friendly (claims realtime on 4 cores). Drop reference clips into ~/.local/share/neural-tts-daemon/voices/moss-tts-nano/<id>.<lang>.wav (no transcript needed)."

[providers.omnivoice]
display_name = "OmniVoice (k2-fsa)"
project_dir = "providers/omnivoice"
python_module = "neural_tts_provider_omnivoice"
supports_cloning = true
needs_models = true
notes = "Zero-shot voice cloning, 600+ languages, GPU recommended. Drop reference clips into ~/.local/share/neural-tts-daemon/voices/omnivoice/<id>.<lang>.wav; optional <id>.<lang>.txt overrides Whisper auto-transcription."

[providers.qwen3-tts]
display_name = "Qwen3-TTS (0.6B, streaming)"
project_dir = "providers/qwen3-tts"
python_module = "neural_tts_provider_qwen3_tts"
supports_cloning = true
needs_models = true
notes = "Zero-shot voice cloning, 10 languages, streaming output via the dffdeeq fork (https://github.com/dffdeeq/Qwen3-TTS-streaming). Drop reference clips into ~/.local/share/neural-tts-daemon/voices/qwen3-tts/<id>.<en|zh|ja|ko|de|fr|ru|pt|es|it>.{wav,txt}. Latency knobs: TTS_QWEN3_DECODE_WINDOW_FRAMES, TTS_QWEN3_EMIT_EVERY_FRAMES, TTS_QWEN3_GREEDY, TTS_QWEN3_ATTN."
